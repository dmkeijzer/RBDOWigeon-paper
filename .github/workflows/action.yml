name: Python Package

on:
  push:
    branches: [ main ]

jobs:
  Code-Verification:
    runs-on: self-hosted
    strategy:
      max-parallel: 5
    steps:
      - uses: actions/checkout@v2
#       - name: Set up Python 3.9
#         uses: actions/setup-python@v2
#         with:
#           python-version: 3.9
#       - name: Add conda to system path
#         run: |
#           echo $CONDA/bin >> $GITHUB_PATH
      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
      - name: Install Pylint
        run: |
          python -m pip install pylint
      - name: Lint with pylint
        run: |
          pylint *.py -d C0301,C0103,R0801,C0116,C0114,C0115,R0902,W0201 --fail-under=8

  Calculation-Verification:
    runs-on: self-hosted
    needs: Code-Verification
    strategy:
      max-parallel: 5
    steps:
      - uses: actions/checkout@v2
#       - name: Set up Python 3.9
#         uses: actions/setup-python@v2
#         with:
#           python-version: 3.9
#       - name: Add conda to system path
#         run: |
#           echo $CONDA/bin >> $GITHUB_PATH
      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
      - name: Install pytest
        run: |
          python -m pip install pytest
      - name: Test with pytest
        run: |
          cd test
          python -m pytest -v .
    
