<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x" crossorigin="anonymous">

    <title>Structures Figure Repository</title>
</head>

<body style="background-color: rgb(17, 17, 17);">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="/structures.html">&nbsp;&nbsp; Structural Design Figures</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <!-- <li class="nav-item active" onclick="showGraph(this.innerText);">
                    <a class="nav-link" href="#">Sample</a>
                </li> -->
            </ul>
        </div>
    </nav>

    <div class="figure">
        <iframe src="/loads.html" frameborder="0" style="display: block; width: 100%; height: 100%; position: absolute;">
            Your Browser Does Not Support iFrames
        </iframe>
    </div>

    <script>
        const graphs = [["loads", "Load Diagrams"], ["Lift", "Lift Distribution"]];

        const showGraph =  ( event ) => {
            const frame = document.querySelector("iframe");
            const name = graphs.filter(g => g[1] === event.target.innerText)[0][0];
            frame.src = `/${name}.html`;
            frame.style.display = "block";
            // document.querySelector("div.figure").appendChild(frame);
        }

        for (var [ graphFile, graphName ] of graphs) {
            const link = document.createElement("a");
            link.className = "nav-link";
            link.href = "#" + graphFile;
            link.innerText = graphName;
            link.id = graphFile;
            const item = document.createElement("li");
            item.className = "nav-item";
            item.id = graphFile;
            item.addEventListener("click", showGraph);
            item.appendChild(link);
            document.querySelector("ul.navbar-nav").appendChild(item);
        }

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-gtEjrD/SeCtmISkJkNUaaKMoLD0//ElJ19smozuHV6z3Iehds+3Ulb9Bn9Plx0x4"
        crossorigin="anonymous"></script>


</body>

</html>
